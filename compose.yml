version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: kosha-postgres
    environment:
      POSTGRES_USER: kosha
      POSTGRES_DB: kosha_db
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/

    secrets:
      - db_password

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kosha -d kosha_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: kosha-redis
    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: kosha-minio
    environment:
      MINIO_ROOT_USER_FILE: /run/secrets/minio_root_user
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
    ports:
      - "9000:9000"
      - "9001:9001"

    volumes:
      - minio_data:/data

    command: server /data --console-address ":9001"
    secrets:
      - minio_root_user
      - minio_root_password

    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: kosha-backend
    volumes:
      - .:/app

    ports:
      - "8000:8000"

    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: kosha
      DB_NAME: kosha_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    secrets:
      - db_password
      - spotify_client_id
      - spotify_client_secret
      - youtube_api_key
      - github_api_token
      - email_username
      - email_password
      - youtube_client_id
      - youtube_client_secret

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kosha-frontend
    ports:
      - "5173:5173"

    volumes:
      - ./frontend:/app
      - /app/node_modules

    environment:
      - NODE_ENV=development

    depends_on:
      - backend

    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: kosha-worker
    command: celery -A backend.worker.celery_app worker --loglevel=info
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: kosha
      DB_NAME: kosha_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    secrets:
      - db_password
      - spotify_client_id
      - spotify_client_secret
      - youtube_client_id
      - youtube_client_secret
      - youtube_api_key
      - github_api_token
      - email_username
      - email_password

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: kosha-beat
    command: celery -A backend.worker.celery_app beat --loglevel=info
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: kosha
      DB_NAME: kosha_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    secrets:
      - db_password

    depends_on:
      - worker

    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:

secrets:
  db_password:
    file: ./infra/secrets/db_password.txt
  minio_root_user:
    file: ./infra/secrets/minio_root_user.txt
  minio_root_password:
    file: ./infra/secrets/minio_root_password.txt
  spotify_client_id:
    file: ./infra/secrets/spotify_client_id.txt
  spotify_client_secret:
    file: ./infra/secrets/spotify_client_secret.txt
  youtube_api_key:
    file: ./infra/secrets/youtube_api_key.txt
  github_api_token:
    file: ./infra/secrets/github_api_token.txt
  email_username:
    file: ./infra/secrets/email_username.txt
  email_password:
    file: ./infra/secrets/email_password.txt
  youtube_client_id:
    file: ./infra/secrets/youtube_client_id.txt
  youtube_client_secret:
    file: ./infra/secrets/youtube_client_secret.txt
