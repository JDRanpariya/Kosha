version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: kosha-postgres
    environment:
      POSTGRES_USER: kosha
      POSTGRES_DB: kosha_db
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/]
    secrets: [db_password]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kosha -d kosha_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: kosha-redis
    ports: ["6379:6379"]
    volumes: [redis_data:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: kosha-backend
    volumes: [.:/app]
    ports: ["8000:8000"]
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: kosha
      DB_NAME: kosha_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    secrets:
      - db_password
      - youtube_api_key
      - email_username
      - email_password

    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kosha-frontend
    ports: ["5173:5173"]
    volumes:
      - ./frontend:/app
      - /app/node_modules

    environment: [NODE_ENV=development]
    depends_on: [backend]
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

secrets:
  db_password:
    file: ./infra/secrets/db_password.txt
  youtube_api_key:
    file: ./infra/secrets/youtube_api_key.txt
  email_username:
    file: ./infra/secrets/email_username.txt
  email_password:
    file: ./infra/secrets/email_password.txt
